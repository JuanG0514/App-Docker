# Datasource - usa variables de entorno con valores por defecto para desarrollo local
spring.datasource.url=jdbc:mysql://${DB_HOST:bd}:${DB_PORT:3306}/${DB_NAME:inventario_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:inventario_user}
spring.datasource.password=${DB_PASS:inventario_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=3000
